<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUNIFIX - Réinitialiser le mot de passe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body{background:#f6f8f8;color:#103c3b;font-family:Arial,sans-serif}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .cardx{max-width:560px;width:100%;background:#fff;border-radius:28px;box-shadow:0 14px 40px rgba(8,61,60,.08);padding:32px}
    .btn-main{background:#083d3c;color:#fff;border:none;border-radius:999px;padding:12px 22px;font-weight:700}
    .btn-main:hover{background:#0d5251;color:#fff}
    .form-control{border-radius:18px;padding:13px 15px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="cardx">
      <h1 class="h3 fw-bold mb-3">Réinitialiser le mot de passe</h1>
      <p class="text-secondary">Entrez votre nouveau mot de passe.</p>
      <div id="feedback"></div>
      <form id="resetForm">
        <div class="mb-3">
          <label class="form-label">Nouveau mot de passe</label>
          <input id="password" class="form-control" type="password" minlength="8" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmer le mot de passe</label>
          <input id="confirmPassword" class="form-control" type="password" minlength="8" required />
        </div>
        <button class="btn btn-main" type="submit">Enregistrer</button>
        <a class="btn btn-outline-secondary rounded-pill ms-2" href="login-client.html">Retour</a>
      </form>
    </div>
  </div>
  <script>
    const feedback = document.getElementById('feedback');
    const token = new URLSearchParams(location.search).get('token') || '';
    function msg(text, ok){ feedback.innerHTML = `<div class="alert alert-${ok ? 'success' : 'danger'}">${text}</div>`; }
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (!token) return msg('Lien invalide.', false);
      if (password.length < 8) return msg('Le mot de passe doit contenir au moins 8 caractères.', false);
      if (password !== confirmPassword) return msg('Les mots de passe ne correspondent pas.', false);
      try {
        const response = await fetch('/api/password/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || 'Erreur');
        msg('Mot de passe mis à jour avec succès. Vous pouvez maintenant vous connecter.', true);
      } catch (error) {
        msg(error.message || 'Erreur', false);
      }
    });
  </script>
</body>
</html>
